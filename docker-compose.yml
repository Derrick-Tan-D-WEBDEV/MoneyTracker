services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: moneytracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moneytracker}
      POSTGRES_DB: money_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneytracker -d money_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8128:3000"
    environment:
      DATABASE_URL: postgresql://moneytracker:${POSTGRES_PASSWORD:-moneytracker}@db:5432/money_tracker?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://187.77.153.20:8128}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      CRON_SECRET: ${CRON_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

  cron:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
    command: >
      sh -c "
        apk add --no-cache curl tzdata >/dev/null &&
        echo '0 8 * * * curl -fsSL -H \"Authorization: Bearer $$CRON_SECRET\" -X POST http://app:3000/api/cron/cards-refresh >> /var/log/cron.log 2>&1' > /etc/crontabs/root &&
        echo '0 9 * * 1 curl -fsSL -H \"Authorization: Bearer $$CRON_SECRET\" -X POST http://app:3000/api/cron/cards-catalog-sync >> /var/log/cron.log 2>&1' >> /etc/crontabs/root &&
        touch /var/log/cron.log &&
        crond -f -L /var/log/cron.log
      "

volumes:
  postgres_data:
