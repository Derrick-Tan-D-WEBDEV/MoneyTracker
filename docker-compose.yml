services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: moneytracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moneytracker}
      POSTGRES_DB: money_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneytracker -d money_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8128:3000"
    environment:
      DATABASE_URL: postgresql://moneytracker:${POSTGRES_PASSWORD:-moneytracker}@db:5432/money_tracker?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://187.77.153.20:8128}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
